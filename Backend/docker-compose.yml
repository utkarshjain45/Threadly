version : "3.8"

services:
  threadly-product-service:
    image: utkarshjain45/threadly-product-service
    container_name: threadly-product-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://threadly-product-db:5432/threadly-product-db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8082:8082"
    depends_on:
      - threadly-product-db
      - threadly-service-discovery
    networks:
      - threadly-network

  threadly-product-db:
    image: postgres:16-alpine
    container_name: threadly-product-db
    environment:
      POSTGRES_USER : postgres
      POSTGRES_PASSWORD : postgres
      POSTGRES_DB : threadly-product-db
    ports:
      - "5440:5432"
    volumes:
      - threadly-product-db-data:/var/lib/postgresql/data
    networks:
      - threadly-network

  threadly-user-authentication:
    image: utkarshjain45/threadly-user-authentication
    container_name: threadly-user-authentication
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://threadly-users-db:5432/threadly-users-db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8081:8081"
    depends_on:
      - threadly-users-db
      - threadly-service-discovery
    networks:
      - threadly-network

  threadly-users-db:
    image: postgres:16-alpine
    container_name: threadly-users-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: threadly-users-db
    ports:
      - "5441:5432"
    volumes:
      - threadly-users-db-data:/var/lib/postgresql/data
    networks:
      - threadly-network

  threadly-order-and-cart-management:
    image: utkarshjain45/threadly-order-and-cart-management
    container_name: threadly-order-and-cart-management
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://threadly-order-and-cart-db:5432/threadly-order-and-cart-db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8084:8084"
    depends_on:
      - threadly-order-and-cart-db
      - threadly-service-discovery
    networks:
      - threadly-network

  threadly-order-and-cart-db:
    image: postgres:16-alpine
    container_name: threadly-order-and-cart-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: threadly-order-and-cart-db
    ports:
      - "5442:5432"
    volumes:
      - threadly-order-and-cart-db-data:/var/lib/postgresql/data
    networks:
      - threadly-network

  threadly-service-discovery:
    image: utkarshjain45/threadly-service-discovery
    container_name: threadly-service-discovery
    ports:
      - "8761:8761"
    networks:
      - threadly-network

  threadly-api-gateway:
    image: utkarshjain45/threadly-api-gateway
    container_name: threadly-api-gateway
    ports:
      - "8080:8080"
    networks:
      - threadly-network
    depends_on:
      - threadly-service-discovery

volumes:
  threadly-product-db-data:
  threadly-users-db-data:
  threadly-order-and-cart-db-data:

networks:
  threadly-network:
    driver: bridge